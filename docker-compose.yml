services:
  postgres:
    image: postgres:17
    container_name: cli-auth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 3s
      timeout: 3s
      retries: 5

  migration:
    image: migrate/migrate
    container_name: cli-auth-migration
    volumes:
      - ./migration:/migrations
    command:
      - -path=/migrations
      - -database=postgres://postgres:postgres@postgres:5432/auth_db?sslmode=disable
      - up
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cli-auth-app
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/auth_db?sslmode=disable
      - SESSION_DURATION=5m
      - LOCKOUT_DURATION=1m
    stdin_open: true
    tty: true
    depends_on:
      postgres:
        condition: service_healthy
      migration:
        condition: service_completed_successfully

volumes:
  postgres_data: